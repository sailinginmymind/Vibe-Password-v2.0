<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibe Password Gen 1.8.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container" id="main-container">
        
        <button id="theme-switch" onclick="toggleTheme()" title="Cambia Vibe">◑</button>
        <button id="info-btn" onclick="toggleStats(true)">i</button>

        <h1 class="header-title">Vibe Password</h1>
        
        <div id="password-display" role="button" aria-label="Copia password" onclick="copyToClipboard()">GENERA</div>
<div id="copy-hint-container" class="hidden">
    <span class="hint-text">CLICCA PER COPIARE</span>
</div>
        <div class="strength-container">
            <div id="strength-bar"></div>
        </div>
        
        <div id="crack-time">In attesa di input...</div>

        <section class="controls">
            <div class="control-group">
                <label for="length-slider">
                    <span>LUNGHEZZA</span>
                    <span id="length-val">16</span>
                </label>
                <input type="range" id="length-slider" min="6" max="52" value="16" oninput="updateUI()">
            </div>

            <div class="options-grid">
                <label class="option-item active">
                    <input type="checkbox" id="opt-upper" checked onchange="handleToggle(this)">
                    <span class="option-label">ABC</span>
                </label>
                <label class="option-item active">
                    <input type="checkbox" id="opt-lower" checked onchange="handleToggle(this)">
                    <span class="option-label">abc</span>
                </label>
                <label class="option-item active">
                    <input type="checkbox" id="opt-numbers" checked onchange="handleToggle(this)">
                    <span class="option-label">123</span>
                </label>
                <label class="option-item active">
                    <input type="checkbox" id="opt-symbols" checked onchange="handleToggle(this)">
                    <span class="option-label">$%&</span>
                </label>
            </div>
        </section>

        <button type="button" class="main-generate" onclick="generate()">GENERA</button>
    </main>

    <div id="stats-overlay" class="overlay">
        <div class="overlay-content">
            <button class="close-btn" onclick="toggleStats(false)">×</button>
            <h2 style="margin-bottom: 20px; font-family: var(--font-ui); color: #fff;">Analisi Tecnica</h2>
            
            <div id="stats-data">
                </div>
            
            <p class="stats-explanation">
                La stima si basa su un attacco brute-force che testa 1.000 miliardi (1 trilione) di combinazioni al secondo.
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
